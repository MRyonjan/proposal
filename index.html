<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI System // Proposal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04060a;
      --card: #0b0f19;
      --accent: #7b5bff;
      --accent2: #23d2ff;
      --text: #e8eeff;
      --muted: #9db2d4;
      --love: #ff5f9f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, #11162a 0, #04060a 35%, #010308 70%);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .frame {
      width: min(1100px, 95vw);
      background: linear-gradient(135deg, rgba(35,210,255,0.08), rgba(123,91,255,0.08));
      border: 1px solid rgba(123,91,255,0.3);
      border-radius: 18px;
      padding: clamp(18px, 4vw, 32px);
      box-shadow: 0 20px 80px rgba(0,0,0,0.45), 0 0 30px rgba(35,210,255,0.12);
      position: relative;
      overflow: hidden;
    }
    /* Scan grid background */
    .frame::before, .frame::after {
      content: "";
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 24px),
                  repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 24px);
      mask-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.18), transparent 70%);
      pointer-events: none;
    }
    .frame::after {
      background: radial-gradient(circle at 20% 10%, rgba(123,91,255,0.25), transparent 35%),
                  radial-gradient(circle at 80% 20%, rgba(35,210,255,0.25), transparent 40%);
      mix-blend-mode: screen;
      opacity: .35;
      filter: blur(18px);
    }

    .terminal {
      min-height: 60vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: clamp(18px, 3vw, 28px);
      align-items: center;
      transition: filter .4s ease, transform .4s ease;
    }
    @media (max-width: 860px) {
      .terminal { grid-template-columns: 1fr; }
    }

    .panel {
      background: linear-gradient(145deg, #0c1120, #090c17);
      border: 1px solid rgba(123,91,255,0.25);
      border-radius: 14px;
      padding: clamp(14px, 3vw, 20px);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 25px rgba(123,91,255,0.05), 0 10px 25px rgba(0,0,0,0.35);
    }
    .panel::before {
      content:"";
      position:absolute; inset:-30%; 
      background: conic-gradient(from 90deg at 50% 50%, rgba(123,91,255,0.12), rgba(35,210,255,0.08), rgba(123,91,255,0.12));
      filter: blur(40px);
      opacity: 0.35;
    }
    .panel h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent2);
    }
    .console {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      min-height: 220px;
      position: relative;
    }
    .cursor {
      display: inline-block;
      width: 9px; height: 16px;
      background: var(--accent2);
      margin-left: 4px;
      animation: blink .9s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Photo strip */
    .photos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .photo {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(123,91,255,0.28);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35), 0 0 20px rgba(35,210,255,0.08);
      aspect-ratio: 3/4;
      background: #11172b;
    }
    .photo img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(1.15) contrast(1.05);
      transition: transform .6s ease;
    }
    .photo:hover img { transform: scale(1.05); }
    .tag {
      position: absolute; left: 10px; bottom: 10px;
      background: rgba(4, 6, 10, 0.76);
      border: 1px solid rgba(123,91,255,0.5);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--accent2);
      box-shadow: 0 0 12px rgba(35,210,255,0.25);
    }

    /* Glitch */
    .glitch {
      position: relative;
      color: var(--text);
      font-size: clamp(26px, 3vw, 32px);
      letter-spacing: .04em;
      filter: drop-shadow(0 0 6px rgba(35,210,255,0.35));
      animation: glitch 1.4s infinite steps(2);
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute; left: 0; top: 0;
      opacity: .75;
      mix-blend-mode: lighten;
    }
    .glitch::before { color: #23d2ff; transform: translate(2px, -2px); }
    .glitch::after { color: #7b5bff; transform: translate(-2px, 2px); }
    @keyframes glitch {
      0%,14% { clip-path: inset(0 0 0 0); }
      15%,29% { clip-path: inset(30% 0 55% 0); transform: translate(-2px, 2px); }
      30%,44% { clip-path: inset(60% 0 20% 0); transform: translate(2px, -2px); }
      45%,59% { clip-path: inset(0 0 0 0); }
      60%,74% { clip-path: inset(15% 0 35% 0); transform: translate(1px, 0); }
      75%,100% { clip-path: inset(0 0 0 0); }
    }

    /* Reveal */
    .reveal {
      text-align: center;
      padding: clamp(18px, 4vw, 32px);
      background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,95,159,0.08));
      border-radius: 16px;
      border: 1px solid rgba(255,95,159,0.35);
      box-shadow: 0 15px 40px rgba(255,95,159,0.22);
      font-family: 'Inter', sans-serif;
    }
    .reveal h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 44px);
      color: #ffe7f2;
      letter-spacing: .02em;
    }
    .reveal p {
      margin: 6px 0;
      color: #f9dce8;
      font-size: clamp(16px, 2.5vw, 20px);
    }
    .buttons {
      margin-top: 18px;
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .btn {
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      color: #0b0f19;
      background: linear-gradient(135deg, #ff82b5, #ff5f9f);
      box-shadow: 0 10px 30px rgba(255,95,159,0.35);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .btn.alt {
      background: linear-gradient(135deg, #7b5bff, #23d2ff);
      color: #f7fbff;
      box-shadow: 0 10px 30px rgba(35,210,255,0.28);
    }
    .btn:hover { transform: translateY(-2px) scale(1.02); }
    .final {
      margin-top: 14px;
      font-size: 15px;
      color: #ffe2ff;
      opacity: 0;
      transition: opacity .5s ease;
    }

    /* Confetti */
    canvas#confetti {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
    }

    /* Soft vignette */
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,0.35));
      mix-blend-mode: soft-light;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="vignette"></div>
  <div class="frame">
    <div class="terminal" id="terminal">
      <div class="panel">
        <h2>AI SYSTEM // STATUS</h2>
        <div class="console" id="console"></div>
      </div>
      <div class="panel">
        <h2>VISUAL ANALYSIS</h2>
        <div class="photos">
          <div class="photo">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80" alt="placeholder">
            <div class="tag">Smile detection: 100%</div>
          </div>
          <div class="photo">
            <img src="https://images.unsplash.com/photo-1524504388940-9f91e86ca31c?auto=format&fit=crop&w=800&q=80" alt="placeholder">
            <div class="tag">Cuteness level: Critical</div>
          </div>
          <div class="photo">
            <img src="https://images.unsplash.com/photo-1524504388940-1b8c1a0f3e1c?auto=format&fit=crop&w=800&q=80" alt="placeholder">
            <div class="tag">Impact: Life-changing</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="glitchPanel" style="margin-top:18px; display:none;">
      <div class="glitch" data-text="Error...">Error...</div>
      <div class="glitch" data-text="System cannot remain objective...">System cannot remain objective...</div>
      <div class="glitch" data-text="Emotions detected...">Emotions detected...</div>
    </div>

    <div class="reveal" id="reveal" style="display:none; margin-top:18px;">
      <h1>This is not a system anymore...</h1>
      <p>It’s just me.</p>
      <p>And I think I’ve fallen for you.</p>
      <div class="buttons">
        <button class="btn" onclick="celebrate()">Yes 💖</button>
        <button class="btn alt" onclick="celebrate()">Of course ❤️</button>
      </div>
      <div class="final" id="finalMsg">System update: Happiest person alive.</div>
    </div>
  </div>

  <script>
    /* Typewriter for console */
    const lines = [
      "Initializing system...",
      "Loading neural networks...",
      "Calibrating empathy filters...",
      "Scanning subject...",
      "Analyzing smile patterns...",
      "Assessing heart-rate variability...",
      "Processing feelings...",
      "Conclusion pending..."
    ];
    const consoleEl = document.getElementById('console');
    let line = 0, idx = 0;
    function typeLine() {
      if (line >= lines.length) {
        setTimeout(triggerGlitch, 800);
        return;
      }
      const current = lines[line];
      consoleEl.innerHTML = lines.slice(0, line).join("<br>") + "<br>" + current.slice(0, idx) + '<span class="cursor"></span>';
      idx++;
      if (idx <= current.length) {
        setTimeout(typeLine, 32 + Math.random()*45);
      } else {
        line++; idx = 0;
        setTimeout(typeLine, 300);
      }
    }
    setTimeout(typeLine, 400);

    /* Glitch transition */
    function triggerGlitch() {
      document.getElementById('glitchPanel').style.display = 'block';
      const term = document.getElementById('terminal');
      term.style.filter = 'blur(4px)';
      term.style.transform = 'scale(0.98)';
      setTimeout(() => {
        term.style.display = 'none';
        document.getElementById('glitchPanel').style.display = 'none';
        showReveal();
      }, 2500);
    }

    /* Reveal screen */
    function showReveal() {
      const reveal = document.getElementById('reveal');
      reveal.style.display = 'block';
      reveal.animate([{opacity:0, filter:'blur(8px)'},{opacity:1, filter:'blur(0)'}], {duration:800, easing:'ease-out'});
    }

    /* Confetti hearts */
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    window.addEventListener('resize', resize); resize();

    function celebrate() {
      document.getElementById('finalMsg').style.opacity = 1;
      spawnConfetti();
    }

    function spawnConfetti() {
      particles = [];
      const colors = ['#ff5f9f', '#ff82b5', '#7b5bff', '#23d2ff', '#ffe2ff'];
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random()*canvas.width,
          y: -20 - Math.random()*200,
          r: 6 + Math.random()*6,
          color: colors[Math.floor(Math.random()*colors.length)],
          vy: 2 + Math.random()*3,
          vx: (Math.random()-0.5)*2,
          rot: Math.random()*Math.PI*2,
          vr: (Math.random()-0.5)*0.2
        });
      }
      requestAnimationFrame(loop);
    }

    function heartPath(ctx, r) {
      ctx.moveTo(0, -r/2);
      ctx.bezierCurveTo(r, -r*1.6, r*2.2, -r*0.1, 0, r*1.4);
      ctx.bezierCurveTo(-2.2*r, -r*0.1, -r, -r*1.6, 0, -r/2);
    }

    function loop() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.scale(0.9,1);
        ctx.beginPath();
        heartPath(ctx, p.r);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();

        p.y += p.vy;
        p.x += p.vx;
        p.rot += p.vr;
      });
      particles = particles.filter(p => p.y < canvas.height + 40);
      if (particles.length) requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
